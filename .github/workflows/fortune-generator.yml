name: "Drift Bottle Fortune Generator"

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  generate-fortune:
    runs-on: ubuntu-latest
    steps:
      - name: Generate fortune drift bottle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FORTUNE_TYPE=$(shuf -n1 -e "daily" "tarot" "encourage" "zodiac" "lucky")
          DATE=$(TZ='Asia/Shanghai' date '+%Y-%m-%d')
          WEEKDAY=$(TZ='Asia/Shanghai' date '+%A')

          case $FORTUNE_TYPE in
            daily)
              STARS=$(shuf -n1 -e "5" "4" "5" "4" "3")
              LUCKY_NUM=$(shuf -i1-99 -n1)
              LUCKY_COLOR=$(shuf -n1 -e "Red" "Blue" "Green" "Yellow" "Purple" "Orange" "White" "Pink")
              LUCKY_DIR=$(shuf -n1 -e "East" "South" "West" "North" "SE" "NE" "SW" "NW")
              MOOD=$(shuf -n1 -e "Happy" "Calm" "Energetic" "Warm" "Excited" "Grateful" "Confident" "Relaxed")
              ADVICE=$(shuf -n1 -e \
                "Try something new today!" \
                "Take some me-time to recharge." \
                "Reach out to an old friend." \
                "Trust your intuition today." \
                "Keep smiling, good luck follows!" \
                "Great day to organize your thoughts." \
                "Unexpected good news coming your way!" \
                "Treat yourself to something nice." \
                "Perfect day to learn a new skill." \
                "Put down your phone and look at the sky.")

              TITLE="Daily Fortune | $DATE"
              BODY=$(cat <<HEREDOC
          ## Drift Bottle from the Sea

          > You found a drift bottle with today's fortune inside...

          ---

          ### $DATE $WEEKDAY

          ### Overall Fortune
          $(printf 'ŌŁÉ%.0s' $(seq 1 $STARS))

          | Item | Content |
          |------|---------|
          | Lucky Number | $LUCKY_NUM |
          | Lucky Color | $LUCKY_COLOR |
          | Lucky Direction | $LUCKY_DIR |
          | Today's Mood | $MOOD |

          ### Today's Tip
          > $ADVICE

          ---

          *This drift bottle washed ashore on $DATE. May good luck be with you!*

          ---

          ## How to Play
          - **Pick up a bottle**: Browse Issues - each one is a drift bottle
          - **Throw a bottle**: Create a new Issue with your message or fortune
          - **Reply**: Comment on others' bottles to spread warmth
          - **Collect**: Add a Reaction to bottles you love
          HEREDOC
              )
              ;;

            tarot)
              CARD=$(shuf -n1 -e \
                "The Fool - New beginnings, infinite possibilities" \
                "The Magician - You have all the power to make dreams real" \
                "The High Priestess - Listen to your inner voice" \
                "The Empress - Harvest and abundance coming your way" \
                "The Emperor - Solid foundation, firm leadership" \
                "The Hierophant - Seek wisdom and guidance" \
                "The Lovers - The power of love and choice" \
                "The Chariot - Forge ahead, victory is in sight" \
                "Strength - Your inner strength is greater than you think" \
                "The Hermit - Wisdom through introspection" \
                "Wheel of Fortune - A turning point is coming" \
                "Justice - Fairness and truth will prevail" \
                "The Hanged Man - See things from a different angle" \
                "Death - Every ending is a new beginning" \
                "Temperance - Balance is the key" \
                "The Tower - Sudden change brings new life" \
                "The Star - Hope and inspiration" \
                "The Moon - Face your inner fears" \
                "The Sun - Light and joy")

              RATING=$(shuf -n1 -e "Great Fortune" "Good Fortune" "Small Fortune" "Fortune" "Moderate")
              POSITION=$(shuf -n1 -e "Upright" "Reversed")

              TITLE="Tarot Reading | $DATE"
              BODY=$(cat <<HEREDOC
          ## Drift Bottle from Afar

          > An ancient drift bottle washed ashore...

          ---

          ### $DATE $WEEKDAY

          ### Today's Card

          **$CARD**

          - Position: **$POSITION**
          - Fortune: **$RATING**

          ### Interpretation
          $(shuf -n1 -e \
            "Change is brewing. Keep an open mind for new possibilities." \
            "The universe is weaving a new story for you. Be patient." \
            "This is a time for reflection and growth." \
            "Trust your intuition. You are on the right path." \
            "New opportunities are heading your way. Reach out and grab them.")

          ---

          *This tarot reading drifted across the sea to find you...*

          ---

          ## How to Play
          - **Pick up a bottle**: Browse Issues - each one is a drift bottle
          - **Throw a bottle**: Create a new Issue with your message or fortune
          - **Reply**: Comment on others' bottles to spread warmth
          - **Collect**: Add a Reaction to bottles you love
          HEREDOC
              )
              ;;

            encourage)
              QUOTE=$(shuf -n1 -e \
                "You don't have to be perfect. Just be yourself." \
                "Every morning is a fresh start." \
                "You are braver than you believe." \
                "Life doesn't wait for hesitation. Keep walking forward." \
                "Today's you is the result of yesterday's choices." \
                "The only heroic thing is to love life after seeing it for what it is." \
                "Your existence is a gift to this world." \
                "Slow and steady wins the race." \
                "All efforts will pay off. It's just a matter of time." \
                "You are becoming a better version of yourself." \
                "Don't forget why you started." \
                "Life is bright and everything is lovely." \
                "May you return as a youth after a thousand sails." \
                "Starlight doesn't ask the traveler. Time doesn't fail the diligent.")

              AUTHOR=$(shuf -n1 -e "A passing traveler" "A cat by the sea" "The distant wind" "A dream under the stars" "Afternoon sunlight" "A midnight lighthouse" "A seagull" "Ocean waves" "A seashell" "The bottle itself")

              TITLE="Warm Message | $DATE"
              BODY=$(cat <<HEREDOC
          ## Drift Bottle from the Sea

          > You found a shimmering bottle on the beach...

          ---

          ### $DATE $WEEKDAY

          ### A Warm Message

          > $QUOTE

          ### From
          *-- $AUTHOR*

          ### Today's Little Joy
          $(shuf -n1 -e \
            "The sun is beautiful today. Go for a walk!" \
            "You will encounter something happy today!" \
            "Someone is silently caring about you." \
            "Today's coffee/tea will taste extra good." \
            "Tonight's moon will be especially beautiful." \
            "Your cooking today will be amazing." \
            "A great song is waiting to be discovered." \
            "Today is perfect for buying yourself some flowers.")

          ---

          *This warmth crossed the ocean just to reach you...*

          ---

          ## How to Play
          - **Pick up a bottle**: Browse Issues - each one is a drift bottle
          - **Throw a bottle**: Create a new Issue with your message or fortune
          - **Reply**: Comment on others' bottles to spread warmth
          - **Collect**: Add a Reaction to bottles you love
          HEREDOC
              )
              ;;

            zodiac)
              ZODIAC=$(shuf -n1 -e "Rat" "Ox" "Tiger" "Rabbit" "Dragon" "Snake" "Horse" "Goat" "Monkey" "Rooster" "Dog" "Pig")
              SCORE=$(shuf -i60-100 -n1)
              LOVE=$(shuf -i60-100 -n1)
              CAREER=$(shuf -i60-100 -n1)
              WEALTH=$(shuf -i60-100 -n1)
              HEALTH=$(shuf -i60-100 -n1)

              ZODIAC_ADVICE=$(shuf -n1 -e \
                "Great day for socializing. Unexpected gains await!" \
                "Good fortune in wealth, but avoid impulse spending." \
                "Be patient in relationships. Communication is key." \
                "Work challenges ahead, but they showcase your abilities." \
                "Rest is important. Don't push yourself too hard." \
                "Perfect day for learning and self-improvement." \
                "Harmonious relationships. Good for collaboration." \
                "Creative inspiration is overflowing today!")

              TITLE="Zodiac Fortune | $DATE"
              BODY=$(cat <<HEREDOC
          ## Drift Bottle from the Sea

          > An ancient bottle holds zodiac secrets...

          ---

          ### $DATE $WEEKDAY

          ### Zodiac Fortune - $ZODIAC

          | Dimension | Score | Status |
          |-----------|-------|--------|
          | Overall | $SCORE/100 | $(if [ $SCORE -ge 90 ]; then echo 'Excellent'; elif [ $SCORE -ge 80 ]; then echo 'Great'; elif [ $SCORE -ge 70 ]; then echo 'Good'; else echo 'Average'; fi) |
          | Love | $LOVE/100 | $(if [ $LOVE -ge 90 ]; then echo 'Blissful'; elif [ $LOVE -ge 80 ]; then echo 'Romantic'; elif [ $LOVE -ge 70 ]; then echo 'Stable'; else echo 'Calm'; fi) |
          | Career | $CAREER/100 | $(if [ $CAREER -ge 90 ]; then echo 'Soaring'; elif [ $CAREER -ge 80 ]; then echo 'Rising'; elif [ $CAREER -ge 70 ]; then echo 'Steady'; else echo 'Adjusting'; fi) |
          | Wealth | $WEALTH/100 | $(if [ $WEALTH -ge 90 ]; then echo 'Jackpot'; elif [ $WEALTH -ge 80 ]; then echo 'Harvest'; elif [ $WEALTH -ge 70 ]; then echo 'Profit'; else echo 'Save'; fi) |
          | Health | $HEALTH/100 | $(if [ $HEALTH -ge 90 ]; then echo 'Amazing'; elif [ $HEALTH -ge 80 ]; then echo 'Great'; elif [ $HEALTH -ge 70 ]; then echo 'Normal'; else echo 'Caution'; fi) |

          ### Fortune Tip
          > $ZODIAC_ADVICE

          ---

          *This $ZODIAC-guarded bottle crossed the stars and sea...*

          ---

          ## How to Play
          - **Pick up a bottle**: Browse Issues - each one is a drift bottle
          - **Throw a bottle**: Create a new Issue with your message or fortune
          - **Reply**: Comment on others' bottles to spread warmth
          - **Collect**: Add a Reaction to bottles you love
          HEREDOC
              )
              ;;

            lucky)
              LUCKY_THINGS=$(shuf -n1 -e "A warm cup of coffee" "A wildflower by the road" "An old song" "A good book" "A long-overdue phone call" "A chance encounter" "A beautiful sunset" "A cool breeze" "A sweet smile" "A lazy afternoon" "A spontaneous walk" "An unexpected surprise")
              LUCKY_FOOD=$(shuf -n1 -e "Hot pot" "Bubble tea" "Cake" "Ice cream" "Sushi" "Pizza" "Fried chicken" "Noodles" "Dumplings" "Fruit salad" "Chocolate" "BBQ")
              COLOR=$(shuf -n1 -e "Coral Red" "Sky Blue" "Mint Green" "Sunflower Yellow" "Lavender Purple" "Peach Pink" "Cloud White" "Deep Sea Blue" "Forest Green" "Sunset Orange")
              NUM1=$(shuf -i1-9 -n1)
              NUM2=$(shuf -i0-9 -n1)
              NUM3=$(shuf -i0-9 -n1)

              TITLE="Lucky Bottle | $DATE"
              BODY=$(cat <<HEREDOC
          ## Drift Bottle from the Sea

          > A bottle full of luck washed up before you...

          ---

          ### $DATE $WEEKDAY

          ### Lucky List

          | Lucky Item | Details |
          |------------|---------|
          | Lucky Number | $NUM1$NUM2$NUM3 |
          | Lucky Color | $COLOR |
          | Lucky Food | $LUCKY_FOOD |
          | Lucky Thing | $LUCKY_THINGS |

          ### Lucky Spell
          > Say this for double the luck:
          >
          > **"$(shuf -n1 -e \
            "I am the luckiest person today!" \
            "Good luck is on its way!" \
            "I deserve all good things!" \
            "The universe is arranging the best for me!" \
            "Everything today is the best arrangement!")"**

          ### Lucky Mission
          $(shuf -n1 -e \
            "Smile at three people today" \
            "Drink eight glasses of water today" \
            "Go to bed 30 minutes early tonight" \
            "Take a nice photo today" \
            "Do something helpful for someone today" \
            "Learn a new word today" \
            "Tidy up your room today" \
            "Call your family today")

          ---

          *This lucky bottle carries a four-leaf clover's blessing across the sea...*

          ---

          ## How to Play
          - **Pick up a bottle**: Browse Issues - each one is a drift bottle
          - **Throw a bottle**: Create a new Issue with your message or fortune
          - **Reply**: Comment on others' bottles to spread warmth
          - **Collect**: Add a Reaction to bottles you love
          HEREDOC
              )
              ;;
          esac

          gh issue create \
            --repo lly20050425/drift-bottle-fortune \
            --title "$TITLE" \
            --body "$BODY" \
            --label "drift-bottle" \
            --label "$FORTUNE_TYPE"

          echo "New drift bottle generated! Type: $FORTUNE_TYPE"
