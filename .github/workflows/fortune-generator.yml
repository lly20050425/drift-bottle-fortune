name: "🌊 漂流瓶运势生成器"

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 00:00（北京时间 08:00）生成新漂流瓶
  workflow_dispatch:  # 支持手动触发

permissions:
  issues: write

jobs:
  generate-fortune:
    runs-on: ubuntu-latest
    steps:
      - name: "🎲 生成随机漂流瓶"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 运势类型随机选择
          FORTUNE_TYPE=$(shuf -n1 -e "daily" "tarot" "encourage" "zodiac" "lucky")

          # 获取当前日期
          DATE=$(TZ='Asia/Shanghai' date '+%Y-%m-%d')
          WEEKDAY=$(TZ='Asia/Shanghai' date '+%A')

          # 根据类型生成不同的运势内容
          case $FORTUNE_TYPE in
            daily)
              STARS=$(shuf -n1 -e "⭐⭐⭐⭐⭐" "⭐⭐⭐⭐" "⭐⭐⭐" "⭐⭐⭐⭐⭐" "⭐⭐⭐⭐")
              LUCKY_NUM=$(shuf -i1-99 -n1)
              LUCKY_COLOR=$(shuf -n1 -e "红色" "蓝色" "绿色" "黄色" "紫色" "橙色" "白色" "粉色")
              LUCKY_DIR=$(shuf -n1 -e "东方" "南方" "西方" "北方" "东南" "东北" "西南" "西北")
              MOOD=$(shuf -n1 -e "开心" "平静" "充满活力" "温暖" "期待" "感恩" "自信" "放松")
              ADVICE=$(shuf -n1 -e \
                "今天适合尝试新事物，勇敢迈出第一步！" \
                "记得给自己一些独处的时间，充电很重要。" \
                "与老朋友联系一下吧，他们可能正想着你。" \
                "今天做决定时相信直觉，它不会让你失望。" \
                "保持微笑，好运自然来！" \
                "适合整理思绪，为未来做计划的好日子。" \
                "今天可能会收到意想不到的好消息！" \
                "给自己买杯好喝的，犒劳一下自己吧。" \
                "今天适合学习新技能，你的潜力超乎想象。" \
                "放下手机，抬头看看天空，你会发现美好。")

              TITLE="🔮 每日运势 | $DATE"
              BODY="## 🌊 来自大海的漂流瓶

          > 你捡到了一个漂流瓶，里面藏着今天的运势...

          ---

          ### 📅 $DATE $WEEKDAY

          ### 🌟 综合运势
          $STARS

          | 项目 | 内容 |
          |------|------|
          | 🎯 幸运数字 | $LUCKY_NUM |
          | 🎨 幸运颜色 | $LUCKY_COLOR |
          | 🧭 幸运方位 | $LUCKY_DIR |
          | 😊 今日心情 | $MOOD |

          ### 💡 今日锦囊
          > $ADVICE

          ---

          *🫧 这个漂流瓶在 $DATE 随海浪飘来，愿好运与你同在~*

          ---

          ## 🎮 玩法说明
          - 🧭 **捡瓶子**：浏览 Issues 列表，每个 Issue 就是一个漂流瓶
          - 📝 **扔瓶子**：创建新 Issue，写下你想对陌生人说的话或你的运势
          - 💬 **回信**：在别人的漂流瓶下评论，传递温暖
          - ⭐ **收藏**：给你喜欢的漂流瓶点个赞（Reaction）"
              ;;

            tarot)
              CARD=$(shuf -n1 -e \
                "🃏 愚者 (The Fool) - 新的开始，无限可能" \
                "🌟 魔术师 (The Magician) - 你拥有实现梦想的一切力量" \
                "🌙 高女祭司 (The High Priestess) - 倾听内心的声音" \
                "👑 女皇 (The Empress) - 丰收与富足即将到来" \
                "🏛️ 皇帝 (The Emperor) - 稳固的根基，坚定的领导" \
                "⛪ 教皇 (The Hierophant) - 寻求智慧的指引" \
                "💕 恋人 (The Lovers) - 爱与选择的力量" \
                "🏎️ 战车 (The Chariot) - 勇往直前，胜利在望" \
                "💪 力量 (Strength) - 内在的力量比你想象的更强大" \
                "🏔️ 隐者 (The Hermit) - 内省的智慧" \
                "🎡 命运之轮 (Wheel of Fortune) - 转机即将出现" \
                "⚖️ 正义 (Justice) - 公平与真相终将到来" \
                "🪢 倒吊人 (The Hanged Man) - 换个角度看问题" \
                "💀 死神 (Death) - 结束是新的开始" \
                "⚖️ 节制 (Temperance) - 平衡是关键" \
                "😈 恶魔 (The Devil) - 警惕诱惑" \
                "🗼 高塔 (The Tower) - 突变带来新生" \
                "⭐ 星星 (The Star) - 希望与灵感" \
                "🌙 月亮 (The Moon) - 直面内心的恐惧" \
                "☀️ 太阳 (The Sun) - 光明与喜悦")

              RATING=$(shuf -n1 -e "大吉" "中吉" "小吉" "吉" "末吉")
              POSITION=$(shuf -n1 -e "正位" "逆位")

              TITLE="🃏 签文漂流瓶 | $DATE"
              BODY="## 🌊 来自远方的漂流瓶

          > 一个古老的漂流瓶被海浪冲上了岸...

          ---

          ### 📅 $DATE $WEEKDAY

          ### 🎴 今日签文

          **$CARD**

          - 牌位：**$POSITION**
          - 签运：**$RATING**

          ### 📜 签文解读
          $(shuf -n1 -e \
            "这张牌暗示着变革的力量正在酝酿，保持开放的心态迎接新的可能。" \
            "宇宙正在为你编织一段新的故事，耐心等待，美好即将揭晓。" \
            "这是一个反思与成长的时刻，过去的经历将成为未来的养分。" \
            "信任自己的直觉，你正在正确的道路上前行。" \
            "新的机遇正在向你走来，勇敢地伸出双手去迎接吧。")

          ---

          *🫧 这张签文随海浪漂泊了许久，终于与你相遇~*

          ---

          ## 🎮 玩法说明
          - 🧭 **捡瓶子**：浏览 Issues 列表，每个 Issue 就是一个漂流瓶
          - 📝 **扔瓶子**：创建新 Issue，写下你想对陌生人说的话或你的运势
          - 💬 **回信**：在别人的漂流瓶下评论，传递温暖
          - ⭐ **收藏**：给你喜欢的漂流瓶点个赞（Reaction）"
              ;;

            encourage)
              QUOTE=$(shuf -n1 -e \
                "你不必完美，你只需要做你自己。✨" \
                "每一个清晨都是一个新的开始。🌅" \
                "你比你想象的更勇敢，比你看上去更坚强。💪" \
                "生活不会因为你的犹豫而停下脚步，所以勇敢往前走吧。🚶" \
                "今天的你，是昨天所有选择的结果。明天的你，取决于今天的行动。🌟" \
                "世界上只有一种英雄主义，就是认清生活后依然热爱它。❤️" \
                "你的存在本身就是这个世界的礼物。🎁" \
                "慢慢来，比较快。🐢" \
                "所有的努力都不会被辜负，只是时间问题。⏳" \
                "你正在成为更好的自己，即使你看不到。🌱" \
                "不要因为走得太远，而忘了为什么出发。🧭" \
                "生活明朗，万物可爱。🌸" \
                "愿你历尽千帆，归来仍是少年。⛵" \
                "星光不问赶路人，时光不负有心人。⭐" \
                "你笑起来真好看，像春天的花一样。🌺")

              AUTHOR=$(shuf -n1 -e "一位路过的旅人" "海边的猫" "远方的风" "星空下的梦" "午后的阳光" "深夜的灯塔" "一只海鸥" "浪花" "贝壳" "漂流瓶自己")

              TITLE="💌 温暖漂流瓶 | $DATE"
              BODY="## 🌊 来自大海的漂流瓶

          > 你在沙滩上发现了一个闪闪发光的瓶子...

          ---

          ### 📅 $DATE $WEEKDAY

          ### 💌 温暖寄语

          > $QUOTE

          ### 🖊️ 来自
          *—— $AUTHOR*

          ### 🌈 今日小确幸
          $(shuf -n1 -e \
            "今天阳光很好，适合出门走走 ☀️" \
            "你今天一定会遇到一件开心的事 🎉" \
            "有人正在默默地关心着你 💕" \
            "今天的咖啡/奶茶会特别好喝 🧋" \
            "今晚的月亮会格外美丽 🌙" \
            "你今天做的饭会特别好吃 🍳" \
            "一首好歌正在等待被发现 🎵" \
            "今天适合给自己买一束花 🌷")

          ---

          *🫧 这份温暖穿越了大海，只为到达你手中~*

          ---

          ## 🎮 玩法说明
          - 🧭 **捡瓶子**：浏览 Issues 列表，每个 Issue 就是一个漂流瓶
          - 📝 **扔瓶子**：创建新 Issue，写下你想对陌生人说的话或你的运势
          - 💬 **回信**：在别人的漂流瓶下评论，传递温暖
          - ⭐ **收藏**：给你喜欢的漂流瓶点个赞（Reaction）"
              ;;

            zodiac)
              ZODIAC=$(shuf -n1 -e "鼠🐭" "牛🐮" "虎🐯" "兔🐰" "龙🐲" "蛇🐍" "马🐴" "羊🐑" "猴🐵" "鸡🐔" "狗🐶" "猪🐷")
              SCORE=$(shuf -i60-100 -n1)
              LOVE=$(shuf -i60-100 -n1)
              CAREER=$(shuf -i60-100 -n1)
              WEALTH=$(shuf -i60-100 -n1)
              HEALTH=$(shuf -i60-100 -n1)

              ZODIAC_ADVICE=$(shuf -n1 -e \
                "今天贵人运旺盛，多参加社交活动会有意外收获！" \
                "财运不错，但切忌冲动消费，理性理财是关键。" \
                "感情方面需要多一些耐心和包容，沟通很重要。" \
                "工作上可能会遇到挑战，但这正是展现能力的机会。" \
                "注意休息，身体是革命的本钱，别太累了。" \
                "今天适合学习进修，为未来发展充电。" \
                "人际关系融洽，适合处理合作事宜。" \
                "创意灵感爆棚，适合从事艺术或创作类工作。")

              TITLE="🐉 生肖运势瓶 | $DATE"
              BODY="## 🌊 来自大海的漂流瓶

          > 一个古老的漂流瓶中，藏着生肖的秘密...

          ---

          ### 📅 $DATE $WEEKDAY

          ### 🐲 生肖运势 - $ZODIAC

          | 运势维度 | 评分 | 状态 |
          |----------|------|------|
          | 📊 综合运势 | $SCORE/100 | $(if [ $SCORE -ge 90 ]; then echo '🔥 大吉'; elif [ $SCORE -ge 80 ]; then echo '✨ 吉'; elif [ $SCORE -ge 70 ]; then echo '😊 中吉'; else echo '🤔 平'; fi) |
          | 💕 爱情运势 | $LOVE/100 | $(if [ $LOVE -ge 90 ]; then echo '❤️‍🔥 甜蜜'; elif [ $LOVE -ge 80 ]; then echo '💕 暧昧'; elif [ $LOVE -ge 70 ]; then echo '🤝 稳定'; else echo '😌 平淡'; fi) |
          | 💼 事业运势 | $CAREER/100 | $(if [ $CAREER -ge 90 ]; then echo '🚀 飞升'; elif [ $CAREER -ge 80 ]; then echo '📈 上升'; elif [ $CAREER -ge 70 ]; then echo '📊 稳定'; else echo '🔄 调整'; fi) |
          | 💰 财富运势 | $WEALTH/100 | $(if [ $WEALTH -ge 90 ]; then echo '💰 暴富'; elif [ $WEALTH -ge 80 ]; then echo '💵 丰收'; elif [ $WEALTH -ge 70 ]; then echo '🏧 小赚'; else echo '🏦 守财'; fi) |
          | 🏥 健康运势 | $HEALTH/100 | $(if [ $HEALTH -ge 90 ]; then echo '💪 棒极了'; elif [ $HEALTH -ge 80 ]; then echo '🏃 良好'; elif [ $HEALTH -ge 70 ]; then echo '😌 一般'; else echo '⚠️ 注意'; fi) |

          ### 📌 运势锦囊
          > $ZODIAC_ADVICE

          ---

          *🫧 这只 $ZODIAC 守护的漂流瓶穿越了星辰大海~*

          ---

          ## 🎮 玩法说明
          - 🧭 **捡瓶子**：浏览 Issues 列表，每个 Issue 就是一个漂流瓶
          - 📝 **扔瓶子**：创建新 Issue，写下你想对陌生人说的话或你的运势
          - 💬 **回信**：在别人的漂流瓶下评论，传递温暖
          - ⭐ **收藏**：给你喜欢的漂流瓶点个赞（Reaction）"
              ;;

            lucky)
              LUCKY_THINGS=$(shuf -n1 -e "一杯温暖的咖啡" "一朵路边的野花" "一首老歌" "一本好书" "一个久违的电话" "一次偶然的相遇" "一场美丽的日落" "一阵清爽的微风" "一个甜甜的微笑" "一个慵懒的午后" "一次说走就走的散步" "一份意外的惊喜")
              LUCKY_FOOD=$(shuf -n1 -e "火锅" "奶茶" "蛋糕" "冰淇淋" "寿司" "披萨" "炸鸡" "面条" "饺子" "水果沙拉" "巧克力" "烤肉")
              COLOR=$(shuf -n1 -e "珊瑚红" "天空蓝" "薄荷绿" "向日葵黄" "薰衣草紫" "蜜桃粉" "云朵白" "深海蓝" "森林绿" "日落橙")
              NUM1=$(shuf -i1-9 -n1)
              NUM2=$(shuf -i0-9 -n1)
              NUM3=$(shuf -i0-9 -n1)

              TITLE="🍀 幸运漂流瓶 | $DATE"
              BODY="## 🌊 来自大海的漂流瓶

          > 一个装满幸运的瓶子被海浪送到了你面前...

          ---

          ### 📅 $DATE $WEEKDAY

          ### 🍀 今日幸运清单

          | 🍀 幸运项目 | 详情 |
          |-------------|------|
          | 🔢 幸运数字 | $NUM1$NUM2$NUM3 |
          | 🎨 幸运色彩 | $COLOR |
          | 🍽️ 幸运美食 | $LUCKY_FOOD |
          | 🎁 幸运事物 | $LUCKY_THINGS |

          ### ✨ 幸运咒语
          > 念出这句话，好运加倍：
          >
          > **「$(shuf -n1 -e \
            "今天我是最幸运的人！" \
            "好运正在赶来的路上！" \
            "我值得一切美好的事物！" \
            "宇宙正在为我安排最好的！" \
            "今天的一切都是最好的安排！"）」**

          ### 🎯 幸运任务
          $(shuf -n1 -e \
            "今天对三个人微笑 😊" \
            "今天喝八杯水 💧" \
            "今天早睡半小时 😴" \
            "今天拍一张好看的照片 📷" \
            "今天做一件帮助别人的事 🤝" \
            "今天学一个新单词 📖" \
            "今天整理一下房间 🧹" \
            "今天给家人打个电话 📞")

          ---

          *🫧 这个幸运瓶带着四叶草的祝福飘洋过海~*

          ---

          ## 🎮 玩法说明
          - 🧭 **捡瓶子**：浏览 Issues 列表，每个 Issue 就是一个漂流瓶
          - 📝 **扔瓶子**：创建新 Issue，写下你想对陌生人说的话或你的运势
          - 💬 **回信**：在别人的漂流瓶下评论，传递温暖
          - ⭐ **收藏**：给你喜欢的漂流瓶点个赞（Reaction）"
              ;;
          esac

          # 创建 Issue（漂流瓶）
          gh issue create \
            --repo lly20050425/drift-bottle-fortune \
            --title "$TITLE" \
            --body "$BODY" \
            --label "漂流瓶" \
            --label "$FORTUNE_TYPE"

          echo "🌊 新的漂流瓶已生成！类型: $FORTUNE_TYPE"
